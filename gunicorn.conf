# gunicorn.conf.py
# Render picks this up automatically when running 'gunicorn app:app'

import multiprocessing

# Use threads (not multiple processes) so daemon threads spawned during
# request handling stay alive for the full duration of the job.
worker_class = "gthread"
workers = 1                      # single process = shared in-memory state if needed
threads = 4                      # handle up to 4 concurrent requests
timeout = 3600                   # 1 hour — long videos need time
graceful_timeout = 60
keepalive = 5

# Render sets PORT env var; default to 10000 to match their detection
bind = f"0.0.0.0:{__import__('os').environ.get('PORT', '10000')}"

# Logging
accesslog = "-"
errorlog  = "-"
loglevel  = "info"
